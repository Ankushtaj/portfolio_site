<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankush | Contact</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, #0077cc, #00b894);
            color: #333;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            margin: 0 1rem;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
            transition: background 0.3s, color 0.3s;
            border-radius: 6px;
        }

        nav ul li a:hover,
        nav ul li a.active {
            background: #00b894;
            color: #fff;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #0077cc;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .contact-info {
            text-align: center;
            margin-bottom: 2rem;
        }

        .contact-info p {
            font-size: 1.1rem;
            margin: 0.3rem 0;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        form input,
        form textarea {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        form input:focus,
        form textarea:focus {
            border-color: #0077cc;
            outline: none;
            box-shadow: 0 0 6px rgba(0, 119, 204, 0.4);
        }

        form button {
            background: #0077cc;
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        form button:hover {
            background: #005fa3;
        }

        button[onclick] {
            margin-top: 1.5rem;
            background: #00b894;
            color: white;
            padding: 0.9rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button[onclick]:hover {
            background: #009f77;
        }

        @media (max-width: 780px) {
            nav ul {
                flex-direction: column;
                align-items: center;
            }

            nav ul li {
                margin: 0.4rem 0;
            }

            main {
                margin: 1rem;
                padding: 1.2rem;
            }

            h2 {
                font-size: 1.4rem;
            }

            .contact-info p {
                font-size: 1rem;
            }

            form input,
            form textarea {
                font-size: 0.9rem;
                padding: 0.7rem;
            }

            form button,
            button[onclick] {
                font-size: 0.95rem;
                padding: 0.8rem;
                width: 100%;
            }
        }
        @media (max-width: 480px) {
            header {
                padding: 0.7rem 0;
            }

            nav ul li a {
                font-size: 0.9rem;
                padding: 0.4rem 0.7rem;
            }

            h2 {
                font-size: 1.2rem;
            }

            .contact-info p {
                font-size: 0.9rem;
            }

            form input,
            form textarea {
                font-size: 0.85rem;
                padding: 0.6rem;
            }

            form button,
            button[onclick] {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="qualifications.html">Qualifications</a></li>
                <li><a href="work.html">Work</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contact Me</h2>
        <div class="contact-info">
            <p><strong>Email:</strong> ankush@example.com</p>
            <p><strong>Phone:</strong> +91-8910305311</p>
            <p><strong>Location:</strong> Kolkata, India</p>
            <p><strong>GitHub:</strong> <a href="https://github.com/ankushtaj7" target="_blank">github.com/ankush</a></p>
            <p><strong>LinkedIn:</strong> <a href="https://linkedin.com/in/ankush"
                    target="_blank">linkedin.com/in/ankush</a></p>
        </div>
        <form id="contact-form">
            <input id="name" placeholder="Name" required>
            <input id="email" placeholder="Email" type="email" required>
            <textarea id="message" placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>

        <button onclick="exportContacts()">Export Contacts (CSV)</button>
    </main>
    <script>
        let contacts = [];
        document.getElementById("contact-form").addEventListener("submit", function (e) {
            e.preventDefault();
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let message = document.getElementById("message").value;
            contacts.push({ name, email, message });
            alert("Contact saved successfully ✅");

            document.getElementById("contact-form").reset();
        });
        function exportContacts() {
            if (contacts.length === 0) {
                alert("No contacts to export!");
                return;
            }
            let csv = "Name,Email,Message\n";
            contacts.forEach(c => {
                csv += `"${c.name}","${c.email}","${c.message}"\n`;
            });

            let blob = new Blob([csv], { type: 'text/csv' });
            let url = URL.createObjectURL(blob);

            let a = document.createElement("a");
            a.href = url;
            a.download = "contacts.csv";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>

</html>
